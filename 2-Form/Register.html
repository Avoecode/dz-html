<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
		rel="stylesheet">
	<title>Форма регистрации</title>
</head>

<body>
	<main>
		<form action="#" id="form" class="form" method="post" novalidate data-js-form>
			<div class="heading">
				<h1 class="heading__h1">Регистрация</h1>
				<p class="heading__text">Уже есть аккаунт&#63
					<a href="#" target="blank" class="heading__enter">Войти</a>
				</p>
			</div>
			<input type="email" id="email" class="form__input" name="email" placeholder="E-mail" autocomplete="off" required>
			<div class="field">
				<input type="text" id="name" class="form__input" name="firstname" placeholder="Имя" autocomplete="off"  required maxlength="20">
				<input type="text" id="lastname" class="form__input" name="lastname" placeholder="Фамилия" autocomplete="off"  required maxlength="20">
			</div>
			<input type="password" id="password" class="form__input" name="password" placeholder="Пароль" minlength="8" autocomplete="off"  required>
			<div class="showPassword symbols"></div>
			<button class="form__btn" type="submit">Зарегистрироваться</button>
			<div class="conditions">
				<input type="checkbox" class="conditions__input" name="agreement" id="checkbox"  autocomplete="off"  required>
				<label for="checkbox">Я прочитал и принимаю
					<a class="conditions_use" href="#" target="blank">
						Условия использования
					</a>
				</label>
			</div>
		</form>
	</main>

	<script src="./Form.js"></script>
</body>

</html>
